<svg xmlns="http://www.w3.org/2000/svg" width="460" height="80" viewBox="0 0 460 80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1f1a"/>
      <stop offset="100%" stop-color="#07131f"/>
    </linearGradient>

    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8"
        flood-color="#39ff88"
        flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Main Button -->
  <rect x="2" y="2" width="456" height="76" rx="14"
        fill="url(#bg)"
        filter="url(#shadow)"/>

  <!-- Border -->
  <rect x="2" y="2" width="456" height="76" rx="14"
        fill="none"
        stroke="url(#glow)"
        stroke-width="2"/>

  <!-- Shine -->
  <rect x="3" y="3" width="454" height="18"
        rx="12"
        fill="#ffffff"
        opacity="0.04"/>

  <!-- Pixel Chameleon Icon -->
  <g transform="translate(22,18)">
    <rect x="0" y="8" width="8" height="8" fill="#39ff88"/>
    <rect x="8" y="0" width="8" height="8" fill="#39ff88"/>
    <rect x="16" y="0" width="8" height="8" fill="#39ff88"/>
    <rect x="24" y="8" width="8" height="8" fill="#39ff88"/>
    <rect x="16" y="16" width="8" height="8" fill="#39ff88"/>
    <rect x="8" y="16" width="8" height="8" fill="#39ff88"/>

    <!-- Eye -->
    <rect x="18" y="4" width="3" height="3" fill="#07131f"/>

    <!-- Tail -->
    <rect x="32" y="8" width="8" height="8" fill="#00d4ff"/>
    <rect x="40" y="16" width="8" height="8" fill="#00d4ff"/>
    <rect x="32" y="24" width="8" height="8" fill="#00d4ff"/>
  </g>

  <!-- Small Label -->
  <text x="82"
        y="28"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11"
        font-weight="700"
        fill="#39ff88"
        letter-spacing="1.6">
        WINDOWS / MAC · FREE
  </text>

  <!-- Main Title -->
  <text x="82"
        y="54"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#ffffff">
        Download Meccha Chameleon Cheat
  </text>

  <!-- Download Icon -->
  <g transform="translate(390,18)">
    <path d="M20 0 V22"
          stroke="url(#glow)"
          stroke-width="3"
          stroke-linecap="round"/>
    <polyline points="10,15 20,25 30,15"
              fill="none"
              stroke="url(#glow)"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"/>
    <line x1="8" y1="32" x2="32" y2="32"
          stroke="url(#glow)"
          stroke-width="3"
          stroke-linecap="round"/>
  </g>
</svg>